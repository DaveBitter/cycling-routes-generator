name: Weekly Cycling Routes

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC (~8am Netherlands)
  workflow_dispatch:      # Manual trigger from GitHub UI

jobs:
  generate-routes:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Needed to commit GPX files back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests matplotlib Pillow

      - name: Generate routes and send email
        env:
          ORS_API_KEY:        ${{ secrets.ORS_API_KEY }}
          RESEND_API_KEY:     ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM:        ${{ secrets.RESEND_FROM }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
          START_ADDRESS:      'Cremerstraat, Haarlem, Netherlands'
          GITHUB_REPOSITORY:  ${{ github.repository }}
          GEOAPIFY_API_KEY:   ${{ secrets.GEOAPIFY_API_KEY }}
        run: python generate_routes.py

      - name: Commit GPX files to repo
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add routes/
          git diff --staged --quiet || git commit -m "Routes week $(date +%Y-%V)"
          git push
